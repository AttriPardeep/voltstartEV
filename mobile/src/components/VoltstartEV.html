<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltStartEV Pitch Deck Generator</title>
<style>
  body { background:#0f172a; color:#e2e8f0; font-family:system-ui; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .box { background:#1e293b; padding:2rem; border-radius:16px; text-align:center; max-width:500px; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
  h1 { color:#0D9488; margin:0 0 0.5rem; }
  p { color:#94a3b8; margin:0 0 1.5rem; line-height:1.5; }
  button { background:#0D9488; color:#0f172a; border:none; padding:14px 28px; font-size:16px; font-weight:700; border-radius:10px; cursor:pointer; transition:0.2s; }
  button:hover { background:#14B8A6; transform:translateY(-1px); }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  #status { margin-top:1rem; color:#64748b; font-size:14px; }
</style>
</head>
<body>
<div class="box">
  <h1>⚡ VoltStartEV Deck</h1>
  <p>Generates the full 12-slide investor pitch deck locally in your browser. No cloud, no dependencies.</p>
  <button id="genBtn">⬇️ Generate & Download PPTX</button>
  <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
const C = {
  navy:"0A0F1E", teal:"0D9488", tealLight:"14B8A6", tealPale:"CCFBF1",
  white:"FFFFFF", offwhite:"F0FDFA", slate:"1E293B", slateLight:"334155",
  gray:"64748B", grayLight:"CBD5E1", amber:"F59E0B", amberLight:"FEF3C7",
  green:"10B981", greenLight:"D1FAE5", red:"EF4444", purple:"7C3AED", purpleLight:"EDE9FE"
};
const shadow = { type:"outer", blur:8, offset:3, angle:135, color:"000000", opacity:0.12 };
const heavyShadow = { type:"outer", blur:16, offset:6, angle:135, color:"000000", opacity:0.18 };

function addStat(s, x, y, w, h, val, lbl, accent, bg) {
  s.addShape("rect", {x,y,w,h, fill:{color:bg||C.slate}, shadow});
  s.addShape("rect", {x,y,w,h:0.04, fill:{color:accent}});
  s.addText(val, {x:x+0.15, y:y+0.25, w:w-0.3, h:0.6, fontSize:26, fontFace:"Arial Black", color:accent, bold:true, align:"center", margin:0});
  s.addText(lbl, {x:x+0.1, y:y+0.88, w:w-0.2, h:0.45, fontSize:10, fontFace:"Calibri", color:C.grayLight, align:"center", margin:0});
}

function addPill(s, x, y, w, h, emoji, title, desc, accent) {
  s.addShape("rect", {x,y,w,h, fill:{color:C.slate}, shadow});
  s.addShape("rect", {x,y,w:0.05,h, fill:{color:accent}});
  s.addText(emoji, {x:x+0.15, y:y+0.08, w:0.5, h:0.5, fontSize:22, align:"center", margin:0});
  s.addText(title, {x:x+0.7, y:y+0.08, w:w-0.85, h:0.32, fontSize:13, fontFace:"Arial Black", color:C.white, bold:true, margin:0});
  s.addText(desc, {x:x+0.7, y:y+0.4, w:w-0.85, h:0.45, fontSize:10, fontFace:"Calibri", color:C.grayLight, margin:0});
}

async function build() {
  const pres = new PptxGenJS();
  pres.layout = "LAYOUT_16x9";
  pres.title = "VoltStartEV — Investor & Client Pitch";
  pres.author = "VoltStartEV Engineering";

  // SLIDE 1 — Hero
  { const s = pres.addSlide(); s.background={color:C.navy};
    s.addShape("rect",{x:0,y:0,w:0.06,h:5.625,fill:{color:C.teal}});
    s.addText("⚡",{x:7.2,y:0.3,w:2.8,h:2.8,fontSize:120,color:C.teal,align:"center",valign:"middle",transparency:82});
    s.addText("INTRODUCING",{x:0.5,y:0.7,w:6,h:0.35,fontSize:10,color:C.tealLight,bold:true,charSpacing:5,margin:0});
    s.addText("VoltStartEV",{x:0.5,y:1.0,w:7,h:1.2,fontSize:64,color:C.white,bold:true,margin:0});
    s.addShape("rect",{x:0.5,y:2.25,w:3.4,h:0.06,fill:{color:C.teal}});
    s.addText("India's Smartest EV Charging Platform",{x:0.5,y:2.45,w:8,h:0.55,fontSize:20,color:C.grayLight,italic:true,margin:0});
    const pills=["⚡ OCPP 1.6\nNative","🤖 AI\nAssistant","📱 Real-time\nTelemetry"];
    pills.forEach((p,i)=>{const x=0.5+i*2.2;
      s.addShape("rect",{x,y:3.5,w:1.9,h:1.5,fill:{color:C.slate},shadow});
      s.addShape("rect",{x,y:3.5,w:1.9,h:0.05,fill:{color:C.teal}});
      s.addText(p,{x,y:3.6,w:1.9,h:1.2,fontSize:11,color:C.grayLight,align:"center",margin:0});
    });
    s.addText("April 2026 | Confidential",{x:7,y:5.2,w:2.8,h:0.3,fontSize:9,color:C.gray,align:"right",margin:0});
  }

  // SLIDE 2 — Problem
  { const s=pres.addSlide(); s.background={color:C.navy};
    s.addText("THE PROBLEM",{x:0.5,y:0.3,w:9,h:0.3,fontSize:9,color:C.teal,bold:true,charSpacing:5,margin:0});
    s.addText("India's EV Charging Gap",{x:0.5,y:0.6,w:9,h:0.7,fontSize:32,color:C.white,bold:true,margin:0});

    const probs=[
      {i:"🏷️",t:"No White-Label Solutions",b:"Indian operators run SteVe/OCPP with zero branded UX. Drivers use generic dashboards or nothing.",c:C.red},

      {i:"🧩",t:"Zero App Intelligence",b:"No AI, no route planning, no session analytics. Just a start/stop button.",c:C.tealLight}
    ];
    probs.forEach((p,i)=>{const x=0.5+(i%2)*4.7, y=1.6+Math.floor(i/2)*1.85;
      s.addShape("rect",{x,y,w:4.3,h:1.65,fill:{color:C.slate},shadow});
      s.addShape("rect",{x,y,w:0.06,h:1.65,fill:{color:p.c}});
      s.addText(p.i,{x:x+0.15,y:y+0.15,w:0.6,h:0.6,fontSize:24,margin:0});
      s.addText(p.t,{x:x+0.85,y:y+0.1,w:3.3,h:0.35,fontSize:13,color:C.white,bold:true,margin:0});
      s.addText(p.b,{x:x+0.85,y:y+0.48,w:3.3,h:1.05,fontSize:10,color:C.grayLight,margin:0});
    });

  // SLIDE 3 — Solution
  { const s=pres.addSlide(); s.background={color:C.navy};

    addStat(s,5.1,4.55,2.1,0.92,"Real-time","Telemetry",C.green);

  }

  // SLIDE 4 — AI Assistant
  { const s=pres.addSlide(); s.background={color:C.navy};
    s.addShape("rect",{x:0,y:0,w:4.5,h:5.625,fill:{color:"0A2020"}});
    s.addShape("rect",{x:0,y:0,w:0.06,h:5.625,fill:{color:C.teal}});
    s.addShape("rect",{x:0.3,y:0.4,w:2.5,h:0.36,fill:{color:C.teal},shadow});
    s.addText("🏆 NOT IN ANY COMPETITOR",{x:0.3,y:0.4,w:2.5,h:0.36,fontSize:9,color:C.white,bold:true,align:"center",margin:0});

      {w:"User",m:"\"Stop charging\"",a:"right",c:C.teal},

    ];
    chats.forEach((c,i)=>{const bx=c.a==="right"?0.3:0.6;
      s.addShape("rect",{x:bx,y:3.38+i*0.5,w:3.6,h:0.42,fill:{color:c.c},shadow});
      s.addText(c.m,{x:bx+0.1,y:3.38+i*0.5,w:3.4,h:0.42,fontSize:9.5,color:C.white,align:c.a,italic:c.a==="right",margin:0});
    });

    s.addShape("rect",{x:4.8,y:0.88,w:1.6,h:0.05,fill:{color:C.teal}});
    const caps=[
      {i:"🗺️",t:"Find & Navigate",d:"Natural language charger search with live availability"},
      {i:"⚡",t:"Start / Stop",d:"Voice or text commands trigger real OCPP actions"},
      {i:"📊",t:"Session Insights",d:"\"How much did I spend this month?\" — answered instantly"},
      {i:"🔍",t:"Smart Filters",d:"\"Fast chargers only\" → filters map automatically"},
      {i:"🌐",t:"Context-Aware",d:"Knows your vehicle, active session, wallet balance"}

    caps.forEach((c,i)=>{const y=1.1+i*0.87;

      s.addText(c.i,{x:4.95,y:y+0.1,w:0.5,h:0.55,fontSize:22,margin:0});
      s.addText(c.t,{x:5.55,y:y+0.05,w:4.0,h:0.3,fontSize:13,color:C.white,bold:true,margin:0});
      s.addText(c.d,{x:5.55,y:y+0.38,w:4.0,h:0.32,fontSize:10,color:C.grayLight,margin:0});
    });
  }

  // SLIDE 5 — Pricing
  { const s=pres.addSlide(); s.background={color:C.navy};
    s.addText("PRICING ENGINE",{x:0.5,y:0.3,w:9,h:0.3,fontSize:9,color:C.amber,bold:true,charSpacing:5,margin:0});
    s.addText("Power-Based Dynamic Pricing",{x:0.5,y:0.6,w:9,h:0.65,fontSize:30,color:C.white,bold:true,margin:0});
    s.addText("India locks chargers at flat ₹8–10/kWh. We price intelligently based on power, time & demand.",{x:0.5,y:1.28,w:9,h:0.38,fontSize:12,color:C.grayLight,margin:0});
    const models=[
      {n:"Per kWh",i:"⚡",e:"₹7.50/kWh",d:"AC Home Chargers\n7kW–22kW",c:C.green},
      {n:"Per Minute",i:"⏱️",e:"₹2/min",d:"Destination Charging\nBusy locations",c:C.tealLight},
      {n:"Tiered Power",i:"📈",e:"₹16→₹28/kWh",d:"HPC 350kW\nPremium tier",c:C.amber},
      {n:"Time-of-Use",i:"🌙",e:"₹6 night / ₹14 peak",d:"Smart Grid Aligned\nOff-peak reward",c:C.purple},
      {n:"Session Fee",i:"🎟️",e:"₹25–₹100",d:"DC Fast Chargers\nReservation access",c:C.red}
    ];
    models.forEach((m,i)=>{const x=0.5+(i%3)*3.05, y=1.9+Math.floor(i/3)*1.75, w=2.85, h=1.6;
      s.addShape("rect",{x,y,w,h,fill:{color:C.slate},shadow});
      s.addShape("rect",{x,y,w,h:0.06,fill:{color:m.c}});
      s.addText(m.i,{x,y:y+0.12,w,h:0.55,fontSize:26,align:"center",margin:0});
      s.addText(m.n,{x,y:y+0.68,w,h:0.28,fontSize:12,color:m.c,bold:true,align:"center",margin:0});
      s.addText(m.e,{x,y:y+0.95,w,h:0.28,fontSize:13,color:C.white,align:"center",margin:0});
      s.addText(m.d,{x,y:y+1.22,w,h:0.32,fontSize:9.5,color:C.grayLight,align:"center",margin:0});
    });
    s.addShape("rect",{x:0.5,y:5.1,w:9,h:0.38,fill:{color:"0A2A1A"},shadow});
    s.addShape("rect",{x:0.5,y:5.1,w:0.06,h:0.38,fill:{color:C.green}});
    s.addText("💡 Tiered pricing on 350kW HPC delivers 2.1× revenue vs flat-rate — without changing hardware",{x:0.7,y:5.1,w:9.0,h:0.38,fontSize:11,color:C.green,align:"left",valign:"middle",margin:0});
  }

  // SLIDE 6 — Market Gap
  { const s=pres.addSlide(); s.background={color:C.navy};
    s.addText("MARKET GAP",{x:0.5,y:0.3,w:9,h:0.3,fontSize:9,color:C.teal,bold:true,charSpacing:5,margin:0});
    s.addText("White-Label Infrastructure India Is Missing",{x:0.5,y:0.6,w:9,h:0.65,fontSize:28,color:C.white,bold:true,margin:0});
    const cols=["Feature","Generic OCPP Apps","VoltStartEV"];
    const rows=[
      ["Branded mobile app","❌ No","✅ Full custom branding"],
      ["Dynamic power-based pricing","❌ No","✅ 5 pricing models"],
      ["AI charging assistant","❌ No","✅ Volt (Claude-powered)"],
      ["RFID + app hybrid auth","❌ No","✅ External RFID + app tag"],
      ["Real-time telemetry in-app","❌ No","✅ WebSocket 5s updates"],
      ["Reservation system","❌ No","✅ OCPP ReserveNow native"],
      ["Fleet / corporate accounts","❌ No","✅ Multi-vehicle + invoicing"],
      ["Wallet + Razorpay UPI","❌ No","✅ Pre-loaded + auto-deduct"],
      ["Monthly CO₂ / usage reports","Partial","✅ Email reports + PDF"],
      ["Offline mode + cache","❌ No","✅ AsyncStorage fallback"]
    ];
    s.addShape("rect",{x:0.4,y:1.5,w:9.2,h:0.38,fill:{color:C.teal}});
    cols.forEach((c,i)=>{const ws=[3.2,2.8,3.2], xs=[0.5,3.7,6.5];
      s.addText(c,{x:xs[i],y:1.5,w:ws[i],h:0.38,fontSize:11,color:C.white,bold:true,align:"center",margin:0});
    });
    rows.forEach((r,ri)=>{const bg=ri%2===0?C.slate:C.navy;
      s.addShape("rect",{x:0.4,y:1.9+ri*0.36,w:9.2,h:0.36,fill:{color:bg}});
      const xs=[0.5,3.7,6.5], ws=[3.2,2.8,3.2], cs=[C.white,C.red,C.green];
      r.forEach((cell,ci)=>{
        s.addText(cell,{x:xs[ci],y:1.9+ri*0.36,w:ws[ci],h:0.36,fontSize:10,color:ci===0?C.grayLight:cs[ci],align:ci===0?"left":"center",bold:ci>0,margin:0});
      });
    });
  }

  // SLIDE 7 — Features
  { const s=pres.addSlide(); s.background={color:C.navy};
    s.addText("PLATFORM FEATURES",{x:0.5,y:0.3,w:9,h:0.3,fontSize:9,color:C.teal,bold:true,charSpacing:5,margin:0});
    s.addText("Built for Real-World EV Charging",{x:0.5,y:0.6,w:9,h:0.65,fontSize:30,color:C.white,bold:true,margin:0});
    const feats=[
      {e:"🗺️",t:"Live Map + Filters",d:"Availability, power, price, distance filters. Real-time status from OCPP.",c:C.teal},
      {e:"🔋",t:"Session Screen",d:"Live power, energy, cost, SOC bar, sparkline, stale data indicator.",c:C.tealLight},

      addPill(s,x,y,4.4,0.88,f.e,f.t,f.d,f.c);
